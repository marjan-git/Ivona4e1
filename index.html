<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Едноставен Квиз - Матура</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            position: relative;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        /* Прогрес */
        .progress {
            background: #ecf0f1;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #3498db;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .question-counter {
            text-align: right;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* Прашање */
        .question-box {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid #3498db;
        }

        .question-box h2 {
            color: #2c3e50;
            font-size: 20px;
            line-height: 1.5;
        }

        /* Одговори */
        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .answer-btn {
            background: white;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .answer-btn:hover {
            border-color: #3498db;
            background: #f8fafc;
        }

        .answer-btn.selected {
            border-color: #3498db;
            background: #e3f2fd;
        }

        .answer-btn.correct {
            border-color: #27ae60;
            background: #d5f4e6;
        }

        .answer-btn.wrong {
            border-color: #e74c3c;
            background: #fadbd8;
        }

        /* Копчиња */
        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #next-btn {
            background: #3498db;
            color: white;
        }

        #next-btn:hover:not(:disabled) {
            background: #2980b9;
        }

        #next-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        #hint-btn {
            background: #f39c12;
            color: white;
        }

        #hint-btn:hover {
            background: #e67e22;
        }

        /* Резултати */
        .result-box {
            text-align: center;
            display: none;
        }

        .result-box h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .score {
            font-size: 48px;
            color: #3498db;
            font-weight: bold;
            margin: 20px 0;
        }

        .score-text {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        #restart-btn {
            background: #27ae60;
            color: white;
            width: 100%;
        }

        #restart-btn:hover {
            background: #219653;
        }

        /* Модален прозорец за совет */
        .hint-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .hint-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hint-icon {
            font-size: 50px;
            margin-bottom: 20px;
            color: #f39c12;
        }

        .hint-text {
            font-size: 18px;
            color: #2c3e50;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .hint-close {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .hint-close:hover {
            background: #2980b9;
        }

        /* Сокриени елементи */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 ПРОВЕРИ ГО ТВОЕТО ЗНАЕЊЕ 📚</h1>
        <p class="subtitle">Проектна задача од Ивона Стефаноска - 4е1 - 2025/26  </p>

        <!-- Прогрес -->
        <div class="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="question-counter" id="question-counter">Прашање 1/6</div>

        <!-- Квиз бокс -->
        <div id="quiz-box">
            <div class="question-box">
                <h2 id="question">Прашањето ќе се појави тука...</h2>
            </div>

            <div class="answers" id="answers">
                <!-- Одговорите ќе се додадат тука -->
            </div>

            <div class="controls">
                <button id="next-btn" disabled>Следно ▶</button>
                <button id="hint-btn">💡 Совет</button>
            </div>
        </div>

        <!-- Резултат бокс -->
        <div class="result-box" id="result-box">
            <h2>🎉 Квизот заврши!</h2>
            <div class="score" id="score">0</div>
            <p class="score-text">Од вкупно <span id="total">6</span> прашања</p>
            <p id="message">Твојот резултат е...</p>
            <button id="restart-btn">🔄 Играј повторно</button>
        </div>
    </div>

    <!-- Модален прозорец за совет -->
    <div class="hint-modal" id="hint-modal">
        <div class="hint-content">
            <div class="hint-icon">💡</div>
            <div class="hint-text" id="hint-message">Советот ќе се појави тука...</div>
            <button class="hint-close" id="hint-close">Затвори</button>
        </div>
    </div>

    <script>
        // ПРАШАЊА ВО КОДОТ
        const questions = [
            {
                question: "Кој е главен град на Франција?",
                answers: ["Лондон", "Париз", "Берлин", "Мадрид"],
                correct: 1,
                hint: "Познат по Ајфеловата кула"
            },
            {
                question: "Колку е 1 + 8 × 7?",
                answers: ["63", "54", "57", "64"],
                correct: 2,
                hint: "Прво точки после линии :)"
            },
            {
                question: "Кој е најголемиот океан на Земјата?",
                answers: ["Атлантски", "Индиски", "Тихи", "Арктички"],
                correct: 2,
                hint: "Покрива 1/3 од Земјината површина"
            },
            {
                question: "Кој е хемискиот симбол за злато?",
                answers: ["Ag", "Fe", "Au", "Cu"],
                correct: 2,
                hint: "Од латинскиот 'Aurum'"
            },
            {
                question: "Во која година прв човек отиде на Месечината?",
                answers: ["1965", "1969", "1972", "1958"],
                correct: 1,
                hint: "Аполо 11 мисија"
            },
            {
                question: "Кој ја открил Америка?",
                answers: ["Васко да Гама", "Кристофер Колумбо", "Фернандо Магелан", "Џејмс Кук"],
                correct: 1,
                hint: "Во 1492 година"
            }
        ];

        // Променливи
        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;

        // DOM елементи
        const quizBox = document.getElementById("quiz-box");
        const resultBox = document.getElementById("result-box");
        const questionEl = document.getElementById("question");
        const answersEl = document.getElementById("answers");
        const nextBtn = document.getElementById("next-btn");
        const hintBtn = document.getElementById("hint-btn");
        const restartBtn = document.getElementById("restart-btn");
        const progressBar = document.getElementById("progress-bar");
        const questionCounter = document.getElementById("question-counter");
        const scoreEl = document.getElementById("score");
        const totalEl = document.getElementById("total");
        const messageEl = document.getElementById("message");
        
        // Модален прозорец за совет
        const hintModal = document.getElementById("hint-modal");
        const hintMessage = document.getElementById("hint-message");
        const hintClose = document.getElementById("hint-close");

        // Иницијализација
        function initQuiz() {
            currentQuestion = 0;
            score = 0;
            selectedAnswer = null;
            
            quizBox.style.display = "block";
            resultBox.style.display = "none";
            hintModal.style.display = "none";
            
            totalEl.textContent = questions.length;
            showQuestion();
        }

        // Прикажи прашање
        function showQuestion() {
            const q = questions[currentQuestion];
            questionEl.textContent = q.question;
            
            // Исчисти одговори
            answersEl.innerHTML = "";
            selectedAnswer = null;
            nextBtn.disabled = true;
            nextBtn.textContent = "Следно ▶";
            
            // Додај ги одговорите
            q.answers.forEach((answer, index) => {
                const button = document.createElement("button");
                button.className = "answer-btn";
                button.textContent = answer;
                button.onclick = () => selectAnswer(index);
                answersEl.appendChild(button);
            });
            
            // Ажурирај прогрес
            updateProgress();
        }

        // Избери одговор
        function selectAnswer(index) {
            if (selectedAnswer !== null) return;
            
            selectedAnswer = index;
            
            // Означи го избраниот
            const buttons = document.querySelectorAll(".answer-btn");
            buttons.forEach((btn, i) => {
                if (i === index) {
                    btn.classList.add("selected");
                } else {
                    btn.classList.remove("selected");
                }
            });
            
            // Овозможи "Следно" копче
            nextBtn.disabled = false;
        }

        // Следно прашање
        nextBtn.onclick = function() {
            if (selectedAnswer === null) return;
            
            // Провери одговор
            const isCorrect = selectedAnswer === questions[currentQuestion].correct;
            
            // Означи точен/неточен
            const buttons = document.querySelectorAll(".answer-btn");
            buttons.forEach((btn, i) => {
                if (i === questions[currentQuestion].correct) {
                    btn.classList.add("correct");
                } else if (i === selectedAnswer && !isCorrect) {
                    btn.classList.add("wrong");
                }
                btn.disabled = true;
            });
            
            // Додај поени
            if (isCorrect) score++;
            
            // Чекај 1 секунда пред следното
            nextBtn.disabled = true;
            nextBtn.textContent = "Се проверува...";
            
            setTimeout(() => {
                currentQuestion++;
                
                if (currentQuestion < questions.length) {
                    showQuestion();
                } else {
                    showResults();
                }
            }, 1000);
        };

        // Совет
        hintBtn.onclick = function() {
            const hint = questions[currentQuestion].hint;
            hintMessage.textContent = hint;
            hintModal.style.display = "flex";
        };

        // Затвори го модалниот прозорец
        hintClose.onclick = function() {
            hintModal.style.display = "none";
        };

        // Затвори со клик надвор од содржината
        window.onclick = function(event) {
            if (event.target === hintModal) {
                hintModal.style.display = "none";
            }
        };

        // Ажурирај прогрес
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            progressBar.style.width = progress + "%";
            questionCounter.textContent = `Прашање ${currentQuestion + 1}/${questions.length}`;
        }

        // Прикажи резултати
        function showResults() {
            quizBox.style.display = "none";
            resultBox.style.display = "block";
            
            scoreEl.textContent = score;
            
            // Порака според резултатот
            const percentage = (score / questions.length) * 100;
            let message = "";
            
            if (percentage === 100) {
                message = "Одлично! Совршен резултат! 👏";
            } else if (percentage >= 80) {
                message = "Браво! Многу добро! 😊";
            } else if (percentage >= 60) {
                message = "Добро! 👍";
            } else if (percentage >= 40) {
                message = "Не е лошо. Можеш подобро! 💪";
            } else {
                message = "Пробај повторно! 📚";
            }
            
            messageEl.textContent = message;
        }

        // Рестарт
        restartBtn.onclick = initQuiz;

        // Започни квиз кога се вчитува страницата
        window.onload = initQuiz;
    </script>
</body>
</html>
